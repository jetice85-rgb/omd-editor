<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>OMD Editor</title>
<style>
:root{
  --bg:#1b1e2b;--tb:#212433;--bd:#2a2f42;--red:#d4576b;--pink:#d8909e;
  --tx:#d8dce4;--dim:#828896;--warm:#f5f0eb;--card:#fff;--sb:#191c26;
  --btn-bg:#252836;--code-bg:var(--bd);--quote-bg:rgba(233,69,96,0.06);
  --td-bg:#1a1a2e;--input-bg:#252836;--modal-bg:#16213e;
  --article-bg:#4b5563;--report-bg:#0f0f1a;--report-pg:var(--tb);
  --source-bg:#0a0a1a;--source-ed:#0f0f1a;--source-color:#c0c0d0;
  --status-bg:#14161f;--note-tx:#2d2d2d;--note-h1:#c0392b;--note-h2:#8b4513;
  --note-strong:#000;--note-card-bd:#e5e0d8;--note-card-tx:#555;--note-card-nt:#333;--note-card-ns:#999;
  --sidebar-item:#9ca3af;--sidebar-hover:rgba(212,87,107,.08);--sidebar-active:rgba(212,87,107,.14);
  --ctx-bg:var(--tb);--ctx-bd:var(--bd);--ctx-tx:var(--tx);
}
body.light{
  --bg:#f2f1ed;--tb:#fafaf7;--bd:#e0ded6;--tx:#2d2d2d;--dim:#8c8c8c;
  --warm:#faf8f5;--card:#fff;--sb:#edeae2;--btn-bg:#fff;--code-bg:#f0ede5;
  --quote-bg:rgba(233,69,96,0.05);--td-bg:#fff;--input-bg:#fff;--modal-bg:#fff;
  --article-bg:#9ca3af;--report-bg:#f5f5f0;--report-pg:#fff;
  --source-bg:#f5f5f0;--source-ed:#fff;--source-color:#333;
  --status-bg:#e8e5dd;--note-tx:#1a1a1a;--note-h1:#c0392b;--note-h2:#8b4513;
  --note-strong:#000;--note-card-bd:#d9d9d0;--note-card-tx:#555;--note-card-nt:#333;--note-card-ns:#999;
  --sidebar-item:#777;--sidebar-hover:rgba(233,69,96,0.04);--sidebar-active:rgba(233,69,96,0.06);
  --ctx-bg:#fff;--ctx-bd:#d9d9d0;--ctx-tx:#1a1a1a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column;max-width:100vw}
.main-area{overflow-x:hidden}
.slide-page,.article-page{max-width:100%;box-sizing:border-box}

.tb{display:flex;align-items:center;gap:10px;padding:10px 18px;background:var(--tb);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap;min-height:52px}
.tb .logo{font-size:24px;font-weight:700;color:var(--red);margin-right:10px}
.tb .sep{width:1px;height:26px;background:var(--bd);margin:0 8px;flex-shrink:0}

.mode-btn{height:40px;padding:0 16px;border:1px solid var(--bd);background:var(--btn-bg);color:var(--dim);border-radius:6px;cursor:pointer;font-size:15px;font-weight:500;white-space:nowrap}
.mode-btn:hover{background:var(--sidebar-hover);color:var(--tx);transition:all .15s}
.mode-btn.on{border-color:var(--red);background:rgba(233,69,96,.14);color:var(--tx)}

.tb-btn{height:38px;padding:0 14px;border:1px solid var(--bd);background:var(--btn-bg);color:var(--dim);border-radius:5px;cursor:pointer;font-size:14px;white-space:nowrap;display:inline-flex;align-items:center}
.tb-btn:hover{background:var(--sidebar-hover);color:var(--tx);transition:all .15s}
.exp-wrap{position:relative;z-index:10}
.exp-menu{display:none;position:absolute;top:100%;left:0;background:var(--tb);border:1px solid var(--bd);border-radius:6px;padding:4px 0;min-width:170px;z-index:100}
.exp-menu.show{display:block}
.exp-menu div{padding:10px 16px;cursor:pointer;font-size:14px;color:var(--dim)}
.exp-menu div:hover{background:var(--bd);color:var(--tx)}

/* 主布局：左栏+右主区 */
.layout{flex:1;display:flex;overflow:hidden}
.sidebar{width:260px;background:var(--sb);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sidebar h3{padding:12px 16px 6px;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:0}
.sidebar .item{padding:10px 16px;cursor:pointer;font-size:13px;color:var(--sidebar-item);border-left:3px solid transparent;transition:.1s}
.sidebar .item:hover{background:var(--sidebar-hover);color:var(--tx)}
.sidebar .item.active{border-left-color:var(--red);background:var(--sidebar-active);color:var(--tx)}
.sidebar .item .sub{font-size:11px;color:var(--dim);margin-top:1px}
.sb-tab{flex:1;padding:10px 0;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:16px;border-bottom:2px solid transparent}
.sb-tab.on{border-bottom-color:var(--red);color:var(--tx)}
.main-area{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;justify-content:center}
.main-area.article,.main-area.report,.main-area.default{overflow-x:hidden!important}
.article-page,.slide-page{max-width:100%!important;word-wrap:break-word;overflow-wrap:break-word}
.main-area.zoomable{--zoom:1}
.main-area.zoomable>*{transform:scale(var(--zoom));transform-origin:top left}
.main-area.zoomable .article-page{box-shadow:0 2px 16px rgba(0,0,0,.2)}

/* 灵感流模式 */
.block-stream{flex:1;overflow-y:auto;padding:16px}
.block{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;margin:4px 0;border-radius:12px;background:var(--card);border:1px solid transparent;transition:.15s;cursor:text}
.block:hover{border-color:var(--bd)}
.block:focus-within{border-color:var(--red);box-shadow:0 0 0 2px rgba(233,69,96,.15)}
.block-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center;line-height:1.4;user-select:none}
.block-text{flex:1;outline:none;font-size:16px;line-height:1.6;color:var(--note-tx);min-height:24px;word-break:break-word}
.block-text:empty:before{content:attr(data-placeholder);color:var(--dim);opacity:.5}
.block-stream-hint{text-align:center;padding:40px 16px 16px;color:var(--dim);font-size:14px;opacity:.6;pointer-events:none;user-select:none}
.block-empty .block-text{color:var(--dim)}
.block[data-type="h1"] .block-text{font-size:24px;font-weight:700}
.block[data-type="h2"] .block-text{font-size:20px;font-weight:600}
.block[data-type="quote"] .block-text{font-style:italic;color:var(--dim);border-left:3px solid var(--red);padding-left:12px}
.block[data-type="done"] .block-text{text-decoration:line-through;color:var(--dim)}
.block[data-type="pin"]{background:rgba(233,69,96,.06);border-color:rgba(233,69,96,.2)}
.block-toolbar{display:flex;gap:8px;padding:12px 16px 16px;justify-content:center;flex-shrink:0;border-top:1px solid var(--bd);background:var(--tb)}
.block-toolbar button{width:48px;height:48px;border-radius:50%;border:1px solid var(--bd);background:var(--btn-bg);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.block-toolbar button:hover{background:var(--bd);transform:scale(1.08)}
.block-toolbar button:active{transform:scale(.95)}
@media(max-width:700px){.block-stream{padding:12px 8px}.block{padding:12px;gap:10px}.block-icon{font-size:20px;width:28px}.block-text{font-size:15px}.block-toolbar{gap:6px;padding:10px 12px 14px}.block-toolbar button{width:44px;height:44px;font-size:20px}}


/* 文稿模式 */
.main-area.article{background:#e0e0e0;padding:48px 0 64px;flex-direction:column;align-items:center;justify-content:flex-start;gap:0}
.article-page{width:min(210mm, calc(100vw - 260px));min-height:297mm;margin-top:0;padding:37mm 28mm 35mm 28mm;background:#fff;color:#000;border:1px solid #d4d4d4;box-shadow:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.12);font-family:FangSong,"仿宋",SimSun,serif;font-size:16pt;line-height:29pt;outline:none;position:relative;margin-bottom:24px}
.article-page p{margin:0;text-indent:2em}
.article-page h1{font-family:SimSun,"黑体",sans-serif;font-size:22pt;text-align:center;color:#000;margin:0 0 24pt;text-indent:0}
.article-page h2{font-family:SimSun,"黑体",sans-serif;font-size:16pt;text-indent:0;margin:16pt 0 8pt;color:#000}
.article-page h3{font-family:FangSong,"仿宋",serif;font-size:16pt;font-weight:bold;text-indent:2em;margin:8pt 0;color:#000}
.article-page table{width:100%;border-collapse:collapse;margin:12pt 0;font-size:14pt}
.article-page th,.article-page td{border:1px solid #000;padding:4pt 8pt}
.article-page th{background:#f3f4f6;text-align:center}
.article-page td{text-indent:0}
.article-page .page-num{position:absolute;bottom:8mm;left:0;right:0;text-align:center;font-size:10pt;color:#999;font-family:sans-serif}
.article-page.highlight{box-shadow:0 0 0 3px var(--red),0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.12)!important;transition:box-shadow .15s}
.article-pages-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:24px;width:100%}
.article-pages-wrap .article-page{box-shadow:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.12)}

/* 演讲模式 */
.main-area.report{background:var(--report-bg);padding:24px;display:flex;align-items:center;justify-content:flex-start}
.report-canvas .slide-page{box-shadow:0 4px 24px rgba(0,0,0,.3);width:100%;max-width:960px;aspect-ratio:16/9;min-height:auto;overflow:hidden}
.slide-page{padding:48px 64px;background:var(--tb);color:var(--tx);border-radius:12px;border:1px solid var(--bd);font-size:18px;line-height:1.8;box-shadow:0 4px 24px rgba(0,0,0,.3);outline:none;position:relative}
.slide-page h1{font-size:36px;color:var(--red);margin-bottom:20px}
.slide-page h2{font-size:24px;color:var(--pink);margin:24px 0 12px}
.slide-page .slide-num{position:absolute;bottom:12px;right:16px;font-size:12px;color:var(--dim)}

/* 源码模式 */
.main-area.source{background:var(--source-bg);padding:20px}
.main-area.source #ed{width:100%;max-width:900px;background:var(--source-ed);color:var(--source-color);border:1px solid var(--bd);border-radius:6px;padding:20px;font-family:Consolas,monospace;font-size:13px;line-height:1.7;resize:none;outline:none}

/* 通用编辑器 */
#ed{outline:none;word-wrap:break-word}
#ed h1{color:var(--red);margin-bottom:12px}
#ed h2{color:var(--pink);margin-bottom:8px}
#ed table{border-collapse:collapse;width:100%;margin:16px 0}
#ed th,#ed td{border:1px solid var(--bd);padding:8px 12px;min-width:60px}
#ed th{background:var(--tb);color:var(--red)}
#ed td{background:var(--td-bg)}
#ed code{background:var(--bd);padding:2px 6px;border-radius:3px;font-size:13px}
#ed blockquote{border-left:3px solid var(--red);padding:8px 16px;margin:16px 0;background:rgba(233,69,96,0.06)}
#ed ul,#ed ol{padding-left:24px}
#ed img{max-width:100%;border-radius:8px;margin:16px 0}
#ed hr{border:none;border-top:1px solid var(--bd);margin:28px 0}

/* AI 状态 */
.ai-status{display:flex;align-items:center;padding:10px 16px;font-size:11px;color:var(--dim);border-top:1px solid var(--bd);gap:6px;margin-top:auto}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#4ecca3;flex-shrink:0}
.ai-dot.off{background:var(--dim)}

.sb{display:flex;align-items:center;height:34px;flex-shrink:0;padding:0 16px;background:var(--status-bg);border-top:1px solid var(--bd);font-size:13px;color:var(--dim);flex-shrink:0;gap:10px}
.sb .dot{width:7px;height:7px;border-radius:50%;background:#4ecca3;display:inline-block}
.sb .dot.d{background:var(--red)}

.preso-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:500;flex-direction:column}
.preso-overlay.show{display:flex}
.preso-bar{display:flex;align-items:center;padding:8px 20px;color:#888;font-size:13px;flex-shrink:0}
.preso-stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
.preso-stage .slide-page{width:80vw;max-width:1200px;min-height:60vh;max-height:85vh;overflow:auto;font-size:22px;line-height:2;padding:48px 64px;background:var(--tb);color:var(--tx);border-radius:12px;border:1px solid var(--bd)}
.preso-stage .slide-page h1{font-size:42px;color:#e94560}
.preso-stage .slide-page h2{font-size:28px;color:#f0a0b0}
.preso-nav button:hover{background:rgba(233,69,96,.5)!important}
.slide-theme-nebula .slide-page,.preso-stage .slide-theme-nebula .slide-page{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.slide-theme-nebula .slide-page h1,.preso-stage .slide-theme-nebula .slide-page h1{color:#fff}
.slide-theme-gradient .slide-page,.preso-stage .slide-theme-gradient .slide-page{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#e0e0ff}
.slide-theme-gradient .slide-page h1{color:#ff6b6b}
</style></head>
<body>

<div class="tb">
  <span class="logo">OMD</span>
  <button class="mode-btn on" id="mode-default">📝 默认</button>
  <button class="mode-btn" id="mode-article">📄 文稿</button>
  <button class="mode-btn" id="mode-report">📽 演讲</button>
  <button class="mode-btn" id="mode-source">⟨⟩ 源码</button>
  <span class="sep"></span>
  <span id="article-opts" style="display:none;gap:4px">
    <select id="page-size" style="padding:5px 8px;border:1px solid var(--bd);background:var(--input-bg);color:var(--dim);border-radius:4px;font-size:12px"><option>A4</option><option>Letter</option></select>
  </span>
  <span id="report-opts" style="display:none;gap:4px">
    <select id="slide-ratio" style="padding:5px 8px;border:1px solid var(--bd);background:var(--input-bg);color:var(--dim);border-radius:4px;font-size:12px"><option>16:9</option><option>4:3</option></select>
    <select id="slide-theme" style="padding:5px 8px;border:1px solid var(--bd);background:var(--input-bg);color:var(--dim);border-radius:4px;font-size:12px"><option value="dark">🌙 暗色</option><option value="nebula">🌌 星云</option><option value="gradient">渐变</option></select>
    <button class="tb-btn" id="b-slide-play" style="background:var(--red);border-color:var(--red);color:#fff;display:none">▶ 播放</button>
  </span>
  <span class="sep"></span>
  <button class="tb-btn" id="b-b"><b>B</b></button>
  <button class="tb-btn" id="b-i"><i>I</i></button>
  <button class="tb-btn" id="b-h1">H1</button>
  <button class="tb-btn" id="b-h2">H2</button>
  <button class="tb-btn" id="b-list">≡</button>
  <button class="tb-btn" id="b-quote">❝</button>
  <button class="tb-btn" id="b-table">⊞ 表格</button>
  <button class="tb-btn" id="b-img">🖼</button>
  <span class="sep" style="margin:0 12px"></span>
  <span style="flex:1"></span>
  <button class="tb-btn" id="b-theme">🌓</button>
  <button class="tb-btn" id="b-new">新建</button>
  <button class="tb-btn" id="b-open">打开</button>
  <button class="tb-btn" style="border-color:var(--red);color:var(--red)" id="b-save">保存</button>
  <div class="exp-wrap"><button class="tb-btn" style="background:var(--red);border-color:var(--red);color:#fff" id="b-export">⤓ 导出 ▾</button>
    <div class="exp-menu" id="exp-menu"><div data-fmt="docx">📄 Word</div><div data-fmt="xlsx">📊 Excel</div><div data-fmt="pptx">📽 PPT</div><div data-fmt="pdf">📕 PDF</div></div>
  </div>
</div>

<div class="layout" id="layout">
  <div class="sidebar" id="sidebar">
    <div style="display:flex;border-bottom:1px solid var(--bd)">
      <button class="sb-tab on" id="tab-outline">🖼</button>
      <button class="sb-tab" id="tab-vault">📁</button>
    </div>
    <div id="sidebar-content"></div>
  </div>
  <div class="main-area default" id="main-area"><div class="block-stream" id="block-stream"></div><div class="block-toolbar" id="block-toolbar"><button title="想法" onclick="addBlock('idea')">💡</button><button title="待办" onclick="addBlock('todo')">⬜</button><button title="完成" onclick="addBlock('done')">✅</button><button title="重点" onclick="addBlock('pin')">📌</button><button title="标题" onclick="addBlock('h1')">T</button><button title="引用" onclick="addBlock('quote')">💬</button></div></div>
</div>

<div class="sb"><span class="dot" id="dot"></span><span id="st">已保存</span><span style="margin:0 8px;color:var(--bd)">|</span><span id="mode-label">默认模式</span><span style="margin:0 8px;color:var(--bd)">|</span><span id="wc">0 字</span><span style="margin-left:auto">OMD · 智慧生而共通</span></div>

<div class="preso-overlay" id="preso-overlay"><div class="preso-bar"><span id="preso-counter"></span><span style="flex:1"></span><button id="preso-exit" style="background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px 12px">✕</button></div><div class="preso-stage" id="preso-stage"></div><div class="preso-nav"><button id="preso-prev" style="position:absolute;left:20px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.3);border:none;color:#fff;font-size:40px;cursor:pointer;padding:10px 20px;border-radius:8px">‹</button><button id="preso-next" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.3);border:none;color:#fff;font-size:40px;cursor:pointer;padding:10px 20px;border-radius:8px">›</button></div></div>
<script>
var mode='default',dirty=false,currentOMD='',title='新文档',sidebarTab='outline',reportSlides=[],reportSlidesLoaded=false,reportActive=0;
var ed=document.getElementById('ed'),sb=document.getElementById('sidebar-content'),
    ma=document.getElementById('main-area'),dot=document.getElementById('dot'),
    st=document.getElementById('st'),ml=document.getElementById('mode-label');

var DEFAULT_ARTICLE='---\ntitle: "公文文档"\ntags: [公文]\n---\n\n# 关于印发《品质管理办法》的通知\n\n各部门：\n\n为规范公司产品品质管理流程，确保产品符合客户要求及行业标准，特制定《品质管理办法》，现印发给你们，请遵照执行。\n\n## 第一章 总则\n\n### 第一条 目的\n\n为规范公司产品品质管理流程，确保产品符合客户要求及行业标准，特制定本办法。\n\n### 第二条 适用范围\n\n本办法适用于公司所有产品的设计、生产、检验、交付全过程。\n\n### 第三条 引用标准\n\n- ISO 9001:2015 质量管理体系\n- GB/T 19001-2016 质量管理体系要求\n\n## 第二章 职责分工\n\n### 第四条 品质管理部门职责\n\n品质管理部负责制定和修订品质管理制度，组织产品检验和测试，处理客户投诉和品质异常。\n\n### 第五条 生产部门职责\n\n生产部门须严格执行品质管理制度，做好首检、自检、互检工作，确保产品质量符合标准。\n\n## 第三章 检验标准\n\n| 项目 | 检验标准 | 检验方法 | 频次 |\n| --- | --- | --- | --- |\n| 外观 | 无划痕、无变形 | 目视 | 每批 |\n| 尺寸 | ±0.1mm | 卡尺测量 | 首件 |\n| 性能 | 符合规格书 | 测试台 | 每批 |\n\n## 第四章 附则\n\n本办法自发布之日起生效，由品质管理部负责解释。此前相关制度同时废止。\n\n<!--OMD\ndocument:\n  font: "仿宋"\n  font_size: 16\n  page_size: "A4"\n  page_margin: [37, 35, 28, 26]\n-->\n';

var SAMPLE_NOTES=[
  {t:'今日随想',s:'今天想到OMD应该是一个思考空间，不只是工具...',d:'06-16',tag:'思考'},
  {t:'项目周报',s:'本周完成了编辑器框架、格式导出、表格修复...',d:'06-15',tag:'工作'},
  {t:'读书笔记: 设计心理学',s:'好的设计让用户感觉不到设计的存在...',d:'06-14',tag:'阅读'}
];

var DEFAULT='---\ntitle: "新文档"\ntags: []\n---\n\n# 新文档\n\n开始编写...\n\n<!--OMD\n-->\n';
currentOMD=DEFAULT;

function parseOMD(omd){var t=omd.trimStart();var m=t.match(/^---\n([\s\S]*?)\n---\n/);var meta={title:''},rest=t;if(m){try{m[1].split('\n').forEach(function(l){var x=l.match(/^(\w+):\s*(.+)/);if(x&&x[1]==='title')meta.title=x[2].trim().replace(/^"(.*)"$/,'$1')})}catch(e){}rest=t.slice(m[0].length)}var r=rest.match(/<!--OMD\n?([\s\S]*?)\n?-->/);var body=rest;if(r)body=rest.slice(0,r.index).trim();else body=rest.trim();return{meta:meta,body:body}}
function mdToHTML(body){var h='',lines=body.split('\n'),inT=false,tH='',inC=false,cH='';for(var i=0;i<lines.length;i++){var l=lines[i];if(/^```/.test(l)){if(inC){h+='<pre><code>'+esc(cH.trim())+'</code></pre>\n';cH='';inC=false}else{inC=true}continue}if(inC){cH+=l+'\n';continue}if(/^\|.+\|/.test(l)){if(!inT){inT=true;tH='<table>'}if(/^\|[\s\-:]+\|$/.test(l))continue;var tag=tH==='<table>'?'th':'td';tH+='<tr>'+l.split('|').slice(1,-1).map(function(c){return'<'+tag+'>'+c.trim()+'</'+tag+'>'}).join('')+'</tr>';continue}else if(inT){h+=tH+'</table>\n';tH='';inT=false}if(/^#### (.+)/.test(l))h+='<h4>'+l.slice(5)+'</h4>\n';else if(/^### (.+)/.test(l))h+='<h3>'+l.slice(4)+'</h3>\n';else if(/^## (.+)/.test(l))h+='<h2>'+l.slice(3)+'</h2>\n';else if(/^# (.+)/.test(l))h+='<h1>'+l.slice(2)+'</h1>\n';else if(/^> (.+)/.test(l))h+='<blockquote>'+l.slice(2)+'</blockquote>\n';else if(/^---+$/.test(l.trim()))h+='<hr>\n';else if(/^[\-\*] (.+)/.test(l))h+='<li>'+l.slice(2)+'</li>\n';else if(/^\s*$/.test(l))h+='<br>';else{var t=l;t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');t=t.replace(/`([^`]+)`/g,'<code>$1</code>');t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');h+='<p>'+t+'</p>\n'}}if(inT)h+=tH+'</table>\n';if(inC)h+='<pre><code>'+esc(cH.trim())+'</code></pre>\n';h=h.replace(/((?:<li>[\s\S]*?<\/li>\n?)+)/g,'<ul>$1</ul>');return h}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function wysiwygToMD(el){var p=[];function w(n){if(n.nodeType===3){p.push(n.textContent);return}if(n.nodeType!==1)return;var t=n.tagName.toLowerCase(),k=n.childNodes;function e(){for(var i=0;i<k.length;i++)w(k[i])}switch(t){case'h1':p.push('# ');e();p.push('\n\n');break;case'h2':p.push('## ');e();p.push('\n\n');break;case'h3':p.push('### ');e();p.push('\n\n');break;case'h4':p.push('#### ');e();p.push('\n\n');break;case'p':e();p.push('\n\n');break;case'strong':p.push('**');e();p.push('**');break;case'em':p.push('*');e();p.push('*');break;case'code':if(n.parentNode.tagName.toLowerCase()==='pre'){p.push('\n```\n');e();p.push('\n```\n')}else{p.push('`');e();p.push('`')}break;case'pre':e();break;case'blockquote':p.push('> '+n.textContent.trim().replace(/\n/g,'\n> ')+'\n\n');break;case'li':p.push('- ');e();p.push('\n');break;case'ul':case'ol':e();p.push('\n');break;case'br':p.push('\n');break;case'table':var rs=n.querySelectorAll('tr');for(var r=0;r<rs.length;r++){var cs=rs[r].querySelectorAll('th,td');p.push('|'+Array.from(cs).map(function(c){return' '+c.textContent.trim()+' |'}).join('')+'\n');if(r===0&&cs.length)p.push('|'+Array.from(cs).map(function(){return' --- |'}).join('')+'\n')}p.push('\n');break;default:e();break}}w(el);return p.join('').replace(/\n{3,}/g,'\n\n').trim()}

function buildFolderTree(files){
  var root={};
  files.forEach(function(f){
    var parts=f.path.split('/'),cur=root;
    for(var i=0;i<parts.length-1;i++){
      if(!cur[parts[i]])cur[parts[i]]={_children:{}};
      cur=cur[parts[i]]._children;
    }
    cur[parts[parts.length-1]]=f;
  });
  return root;
}

function renderVaultTree(files){
  var tree=buildFolderTree(files);
  renderTreeNode(tree,sb,0);
}

function renderTreeNode(node,parent,depth){
  var folders=[],files=[];
  Object.keys(node).forEach(function(k){
    if(k==='_children')return;
    if(node[k]._children)folders.push({name:k,children:node[k]._children});
    else files.push(node[k]);
  });
  folders.sort(function(a,b){return a.name.localeCompare(b.name)});
  files.sort(function(a,b){return (a.title||a.path).localeCompare(b.title||b.path)});
  folders.forEach(function(f){
    var div=document.createElement('div');
    div.className='item vault-folder';
    div.style.cssText='padding-left:'+(12+depth*16)+'px;cursor:pointer';
    div.innerHTML='📁 '+f.name+' <span style="font-size:10px;color:var(--dim)">▶</span>';
    var childrenDiv=document.createElement('div');
    childrenDiv.style.display='none';
    renderTreeNode(f.children,childrenDiv,depth+1);
    parent.appendChild(div);
    parent.appendChild(childrenDiv);
    div.onclick=function(e){e.stopPropagation();var show=childrenDiv.style.display==='none';childrenDiv.style.display=show?'block':'none';div.querySelector('span').textContent=show?'▼':'▶'};
  });
  files.forEach(function(f){
    var div=document.createElement('div');
    div.className='item vault-file';
    div.style.cssText='padding-left:'+(12+depth*16)+'px;cursor:pointer';
    div.innerHTML='📄 '+(f.title||f.path.split('/').pop())+'<div class="sub">'+(f.size/1024).toFixed(1)+'KB · '+f.modified.slice(0,10)+'</div>';
    div.onclick=function(){loadVaultFile(f.path)};
    parent.appendChild(div);
  });
}

function loadVaultFile(p){
  sb.innerHTML='<h3>📁 加载中...</h3>';
  fetch('/api/mcp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tool:'omd_read',args:{path:p,format:'full'}})})
    .then(function(r){return r.json()})
    .then(function(data){
      var text=data.content&&data.content[0]?data.content[0].text:'{}';
      var doc=JSON.parse(text);
      currentOMD='---\ntitle: "'+(doc.title||p)+'"\ntags: []\n---\n\n'+doc.body+'\n\n<!--OMD\n-->';
      title=doc.title||p.replace(/\.md$/,'');
      mark(false);setMode(mode);refresh();
    })
    .catch(function(){alert('加载失败')});
}

function extractOutline(body){
  var lines=body.split('\n'),out=[];
  lines.forEach(function(l){
    var m=l.match(/^(#{1,6})\s+(.+)/);
    if(m)out.push({level:m[1].length,text:m[2]});
  });
  return out;
}

function setMode(m){
  if(m===mode)return;
  if(mode==='source'&&m!=='source'){currentOMD=ed.value||currentOMD;title=(currentOMD.match(/^title:\s*"([^"]+)"/m)||[])[1]||title}
  if(m==='source')sync();
  if(m==='report'){reportSlidesLoaded=false;reportSlides=[];reportActive=0}
  mode=m;
  ml.textContent={default:'默认模式',article:'文稿模式',report:'演讲模式',source:'源码模式'}[m];
  document.querySelectorAll('.mode-btn').forEach(function(b){b.className='mode-btn'});
  var mb=document.getElementById('mode-'+m);if(mb)mb.className='mode-btn on';

  var ao=document.getElementById('article-opts'),ro=document.getElementById('report-opts');
  ao.style.display=m==='article'?'flex':'none';
  ro.style.display=m==='report'?'flex':'none';

  ma.innerHTML='';
  ma.className='main-area '+m;

  if(m==='default'){
    ma.style.padding='';
    ma.innerHTML="<div class=\"block-stream\" id=\"block-stream\"></div><div class=\"block-toolbar\" id=\"block-toolbar\"><button title=\"想法\" onclick=\"addBlock('idea')\">💡</button><button title=\"待办\" onclick=\"addBlock('todo')\">⬜</button><button title=\"完成\" onclick=\"addBlock('done')\">✅</button><button title=\"重点\" onclick=\"addBlock('pin')\">📌</button><button title=\"标题\" onclick=\"addBlock('h1')\">T</button><button title=\"引用\" onclick=\"addBlock('quote')\">💬</button></div>";
    renderBlocks();
    buildSidebar(m);
    return;
  }else if(m==='article'){
    ma.style.padding='';
    ma.scrollTop=0;
    renderArticlePages();
    buildSidebar(m);
    return;
  }else if(m==='report'){
    ma.style.padding='';
    renderReportPages();
    buildSidebar(m);
    return;
  }else if(m==='source'){
    ma.innerHTML='<textarea id="ed" spellcheck="false" style="width:100%;height:100%;background:var(--source-ed);color:var(--source-color);border:1px solid var(--bd);border-radius:6px;padding:16px;font-family:Consolas,monospace;font-size:13px;line-height:1.7;resize:none;outline:none">'+esc(currentOMD)+'</textarea>';
    ed=document.getElementById('ed');ed.addEventListener('input',function(){mark(true)});
    buildSidebar(m);
    return;
  }
  ed=document.getElementById('ed');
  refresh();
  bindEditorEvents();
  buildSidebar(m);
}

function renderArticlePages(){
  var d=parseOMD(currentOMD),blocks=d.body.split('\n\n'),pages=[],cur='',c=0;
  for(var i=0;i<blocks.length;i++){cur+=(cur?'\n\n':'')+blocks[i];c++;if(c>=15||i===blocks.length-1){pages.push(cur);cur='';c=0}}
  if(!pages.length)pages.push('');
  var pageSize=document.getElementById('page-size').value;
  var pageW=pageSize==='Letter'?'215.9mm':'210mm';
  ma.style.setProperty('--page-w',pageW);
  var useDual=zoomLevel<0.8&&window.innerWidth>900;
  if(useDual)ma.innerHTML='<div class="article-pages-wrap" id="article-pages-wrap"></div>';
  var wrap=useDual?document.getElementById('article-pages-wrap'):ma;
  pages.forEach(function(pg,i){
    var h='<div class="article-page" data-page="'+i+'" contenteditable="true" style="width:min('+pageW+', calc(100vw - 260px))">'+mdToHTML(pg)+'<div class="page-num">— '+(i+1)+' —</div></div>';
    if(useDual){wrap.innerHTML+=h}else{ma.innerHTML+=h}
  });
  var aps=ma.querySelectorAll('.article-page');
  for(var i=0;i<aps.length;i++){
    aps[i].addEventListener('input',function(){
      var all=ma.querySelectorAll('.article-page');
      var parts=[];
      for(var j=0;j<all.length;j++){parts.push(wysiwygToMD(all[j]))}
      var tail=getOMDTail(currentOMD);
      var body=parts.join('\n\n');
      var m=body.match(/^#\s+(.+)/m);if(m){title=m[1].trim();document.title=title+' - OMD Editor'}
      currentOMD='---\ntitle: "'+title+'"\ntags: []\n---\n\n'+body+'\n\n'+tail;
      mark(true);
    });
  }
}

function renderReportPages(){
  if(!reportSlidesLoaded){
    reportSlides=parseOMD(currentOMD).body.split(/---slide---/);
    if(reportSlides.length===1)reportSlides=parseOMD(currentOMD).body.split(/\n(?=# )/);
    reportSlidesLoaded=true;
  }
  reportActive=0;
  ma.innerHTML="<div class=report-canvas id=report-canvas></div>";
  renderReportSlide();
  buildSidebar(mode);
}
function renderReportSlide(){
  var canvas=document.getElementById('report-canvas');
  if(!canvas||!reportSlides||!reportSlides.length)return;
  var content=reportSlides[reportActive]||'';
  var theme=document.getElementById('slide-theme').value;
  var ratioEl=document.getElementById('slide-ratio');
  var ratio=ratioEl?ratioEl.value:'16:9';
  canvas.innerHTML='<div class="slide-page slide-theme-'+theme+'" contenteditable="true" style="aspect-ratio:'+ratio+'">'+mdToHTML(content.trim())+'<span class="slide-num">'+(reportActive+1)+'/'+reportSlides.length+'</span></div>';
  var sp=canvas.querySelector('.slide-page');
  if(sp){
    sp.addEventListener('input',function(){
      reportSlides[reportActive]=wysiwygToMD(sp);
      var tail=getOMDTail(currentOMD);
      currentOMD='---\ntitle: "'+title+'"\ntags: []\n---\n\n'+reportSlides.join('\n\n---slide---\n\n')+'\n\n'+tail;
      mark(true);
    });
  }
  buildSidebar(mode);
}


function save(){
  sync();
  // 尝试 File System Access API
  if(window.showSaveFilePicker){
    var opts={suggestedName:title+'.omd',types:[{description:'OMD 文档',accept:{'text/markdown':['.omd','.md']}}]};
    window.showSaveFilePicker(opts).then(function(h){
      h.createWritable().then(function(w){
        w.write(currentOMD).then(function(){w.close();mark(false)});
      });
    }).catch(function(){});
    return;
  }
  // 降级：download
  var b=new Blob([currentOMD],{type:'text/markdown'});
  var u=URL.createObjectURL(b);var a=document.createElement('a');
  a.href=u;a.download=title+'.omd';a.click();URL.revokeObjectURL(u);mark(false);refresh();
}
function openFile(){
  // 尝试 File System Access API
  if(window.showOpenFilePicker){
    window.showOpenFilePicker({types:[{description:'OMD 文档',accept:{'text/markdown':['.omd','.md','.txt']}}]}).then(function(hs){
      hs[0].getFile().then(function(f){
        f.text().then(function(t){currentOMD=t;title=f.name.replace(/\\.(omd|md|txt)$/,'');mark(false);setMode(mode);refresh()});
      });
    }).catch(function(){});
    return;
  }
  // 降级
  var i=document.createElement('input');i.type='file';i.accept='.omd,.md,.txt';
  i.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();
    r.onload=function(ev){currentOMD=ev.target.result;title=f.name.replace(/\\.(omd|md|txt)$/,'');mark(false);setMode(mode);refresh()};
    r.readAsText(f)};i.click();
}
function exportFmt(f){sync();fetch('/api/export/'+f,{method:'POST',body:currentOMD}).then(function(r){return r.blob()}).then(function(b){var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=title+'.'+f;a.click();URL.revokeObjectURL(u)}).catch(function(){alert('导出服务未启动')})}
function handleDrop(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){var r=new FileReader();r.onload=function(ev){document.execCommand('insertImage',false,ev.target.result);mark(true)};r.readAsDataURL(f)}}
function bindEditorEvents(){if(!ed)return;ed.addEventListener('drop',handleDrop);ed.addEventListener('dragover',function(e){e.preventDefault()});ed.addEventListener('input',function(){mark(true)})}

    case'3':e.preventDefault();doCmd('formatBlock','h3');break;

    case'l':if(e.shiftKey){e.preventDefault();doCmd('insertUnorderedList')}break;
    case'q':if(e.shiftKey){e.preventDefault();doCmd('formatBlock','blockquote')}break;
  }
});

// 剪贴板粘贴图片
document.addEventListener('paste',function(e){
  var items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')===0){
      e.preventDefault();
      var blob=items[i].getAsFile();
      var r=new FileReader();
      r.onload=function(ev){doCmd('insertImage',ev.target.result)};
      r.readAsDataURL(blob);
      return;
    }
  }
});

// 字数统计
function countWords(t){
  var cn=t.match(/[一-鿿]/g);cn=cn?cn.length:0;
  var en=t.match(/[a-zA-Z]+/g);en=en?en.length:0;
  return cn+en;
}
function updateWC(){
  var wc=document.getElementById('wc');
  if(mode==='article'){
    var pages=ma.querySelectorAll('.article-page');
    var total=0;
    for(var i=0;i<pages.length;i++)total+=countWords(pages[i].textContent||'');
    wc.textContent=pages.length+'页 · '+total+'字';
  }else if(mode==='report'){
    var sp=ma.querySelector('.slide-page');
    if(sp)wc.textContent=countWords(sp.textContent||'')+' 字';
    else wc.textContent='0 字';
  }else if(mode==='source'){
    var src=ed&&ed.value?ed.value:currentOMD;
    wc.textContent=countWords(src)+' 字';
  }else{
    var blocks=document.querySelectorAll('.block .block-text');
    var total=0;
    for(var i=0;i<blocks.length;i++)total+=countWords(blocks[i].textContent||'');
    wc.textContent=total+' 字';
  }
}
document.addEventListener('input',updateWC);
document.addEventListener('selectionchange',function(){setTimeout(updateWC,100)});
document.addEventListener('selectionchange',function(){setTimeout(updateWC,100)});

var presoSlides=[],presoCurrent=0;
document.getElementById('b-slide-play').style.display='';
function startPresentation(){sync();var d=parseOMD(currentOMD);presoSlides=d.body.split(/---slide---/);if(presoSlides.length===1)presoSlides=d.body.split(/\n(?=# )/);presoCurrent=0;document.getElementById('preso-overlay').classList.add('show');var overlay=document.getElementById('preso-overlay');if(overlay.requestFullscreen){overlay.requestFullscreen().catch(function(){})}else if(overlay.webkitRequestFullscreen){overlay.webkitRequestFullscreen()}showPresoSlide(0)}
function showPresoSlide(n){presoCurrent=n;var stage=document.getElementById('preso-stage');var content=presoSlides[n]?presoSlides[n].trim():'';stage.innerHTML='<div class="slide-page">'+mdToHTML(content)+'</div>';document.getElementById('preso-counter').textContent=(n+1)+' / '+presoSlides.length;document.getElementById('preso-prev').style.display=n===0?'none':'';document.getElementById('preso-next').style.display=n>=presoSlides.length-1?'none':''}
function presoPrev(){if(presoCurrent>0)showPresoSlide(presoCurrent-1)}
function presoNext(){if(presoCurrent<presoSlides.length-1)showPresoSlide(presoCurrent+1)}
function stopPresentation(){document.getElementById('preso-overlay').classList.remove('show');if(document.fullscreenElement||document.webkitFullscreenElement){if(document.exitFullscreen){document.exitFullscreen().catch(function(){})}else if(document.webkitExitFullscreen){document.webkitExitFullscreen()}}}
document.getElementById('b-slide-play').onclick=startPresentation;document.getElementById('preso-prev').onclick=presoPrev;document.getElementById('preso-next').onclick=presoNext;document.getElementById('preso-exit').onclick=stopPresentation;
document.getElementById('preso-stage').onclick=function(e){if(e.target===document.getElementById('preso-stage')||e.target.closest('.slide-page'))presoNext()};
document.addEventListener('keydown',function(e){var overlay=document.getElementById('preso-overlay');if(overlay.classList.contains('show')){if(e.key==='ArrowLeft'){e.preventDefault();presoPrev()}else if(e.key==='ArrowRight'){e.preventDefault();presoNext()}else if(e.key==='Escape'){e.preventDefault();stopPresentation()}return}if(e.key==='F5'&&mode==='report'){e.preventDefault();startPresentation()}});

var BLOCK_ICONS={idea:"💡",todo:"⬜",done:"✅",pin:"📌",h1:"#",h2:"##",quote:"💬"};
var BLOCK_PLACEHOLDER={idea:"写点什么...",todo:"待办事项...",done:"已完成...",pin:"重点标记...",h1:"标题",h2:"副标题",quote:"引用..."};
function createBlock(type,text){var d=document.createElement("div");d.className="block"+(text?"":" block-empty");d.setAttribute("data-type",type);var icon=BLOCK_ICONS[type];var ph=BLOCK_PLACEHOLDER[type];d.innerHTML="<span class=block-icon>"+icon+"</span><span class=block-text contenteditable=true data-placeholder=\""+ph+"\"></span>";if(text)d.querySelector(".block-text").textContent=text;var txt=d.querySelector(".block-text");txt.addEventListener("keydown",blockKeydown);txt.addEventListener("input",function(){mark(true)});txt.addEventListener("focus",function(){d.classList.remove("block-empty")});txt.addEventListener("blur",function(){if(!this.textContent.trim())d.classList.add("block-empty")});return d}
function addBlock(type){var s=document.getElementById("block-stream");var b=createBlock(type);s.appendChild(b);b.querySelector(".block-text").focus();mark(true)}
function blockKeydown(e){if(e.key==="Enter"){e.preventDefault();var type=this.parentNode.getAttribute("data-type");var b=createBlock(type);this.parentNode.parentNode.insertBefore(b,this.parentNode.nextSibling);b.querySelector(".block-text").focus()}else if(e.key==="Backspace"&&!this.textContent.trim()&&document.querySelectorAll(".block").length>1){e.preventDefault();var prev=this.parentNode.previousSibling;this.parentNode.remove();if(prev&&prev.querySelector){var t=prev.querySelector(".block-text");if(t){t.focus();var r=document.createRange();r.selectNodeContents(t);r.collapse(false);var s=window.getSelection();s.removeAllRanges();s.addRange(r)}}}}
function blocksToMD(){var lines=[],blocks=document.querySelectorAll(".block");blocks.forEach(function(b){var type=b.getAttribute("data-type"),text=(b.querySelector(".block-text")||{}).textContent||"";switch(type){case"h1":lines.push("# "+text);break;case"h2":lines.push("## "+text);break;case"idea":lines.push(text);break;case"todo":lines.push("- [ ] "+text);break;case"done":lines.push("- [x] "+text);break;case"pin":lines.push("**"+text+"**");break;case"quote":lines.push("> "+text);break;default:lines.push(text)}});return lines.join(String.fromCharCode(10,10))}
function renderBlocks(){var s=document.getElementById("block-stream");if(!s)return;s.innerHTML="";var d=parseOMD(currentOMD);var blocks=parseMDToBlocks(d.body);if(!blocks.length){addBlock("idea");return}blocks.forEach(function(b){var el=createBlock(b.type,b.text);s.appendChild(el)})}
function parseMDToBlocks(body){if(!body||!body.trim())return[];var lines=body.split(String.fromCharCode(10)),blocks=[];for(var i=0;i<lines.length;i++){var l=lines[i],m;if(m=l.match(/^- \[x\] (.+)/)){blocks.push({type:"done",text:m[1]})}else if(m=l.match(/^- \[ \] (.+)/)){blocks.push({type:"todo",text:m[1]})}else if(m=l.match(/^# (.+)/)){blocks.push({type:"h1",text:m[1]})}else if(m=l.match(/^## (.+)/)){blocks.push({type:"h2",text:m[1]})}else if(m=l.match(/^> (.+)/)){blocks.push({type:"quote",text:m[1]})}else if(m=l.match(/^\*\*(.+)\*\*$/)){blocks.push({type:"pin",text:m[1]})}else if(/^\s*$/.test(l)){}else{blocks.push({type:"idea",text:l})}}return blocks}
var _origSync=sync;sync=function(){if(mode==="article"){var pages=document.querySelectorAll(".article-page");var bodies=[];pages.forEach(function(p){bodies.push(wysiwygToMD(p))});var tail=getOMDTail(currentOMD);currentOMD="---"+String.fromCharCode(10)+"title: "+title+String.fromCharCode(10)+"tags: []"+String.fromCharCode(10)+"---"+String.fromCharCode(10,10)+bodies.join(String.fromCharCode(10,10))+String.fromCharCode(10,10)+tail;return}if(mode==="default"){var tail=getOMDTail(currentOMD);currentOMD="---"+String.fromCharCode(10)+"title: "+title+String.fromCharCode(10)+"tags: []"+String.fromCharCode(10)+"---"+String.fromCharCode(10,10)+blocksToMD()+String.fromCharCode(10,10)+tail;return}if(mode==="report"){var tail=getOMDTail(currentOMD);var slides=[];if(reportSlides&&reportSlides.length){reportSlides[reportActive]=wysiwygToMD(document.querySelector(".report-canvas .slide-page"));slides=reportSlides}else{document.querySelectorAll(".main-area .slide-page").forEach(function(sp){var clone=sp.cloneNode(true);var num=clone.querySelector(".slide-num");if(num)num.remove();slides.push(wysiwygToMD(clone))})};currentOMD="---"+String.fromCharCode(10)+"title: "+title+String.fromCharCode(10)+"tags: []"+String.fromCharCode(10)+"---"+String.fromCharCode(10,10)+slides.join(String.fromCharCode(10,10)+"---slide---"+String.fromCharCode(10,10))+String.fromCharCode(10,10)+tail;return}return _origSync();};
var _origRefresh=refresh;refresh=function(){if(mode==="article"){renderArticlePages();buildSidebar(mode);return}if(mode==="default"){renderBlocks();return}return _origRefresh();};

var AUTOSAVE_KEY='omd-autosave';

function autosaveLoad(){try{var d=JSON.parse(localStorage.getItem(AUTOSAVE_KEY));if(d&&d.omd&&Date.now()-d.time<86400000){currentOMD=d.omd;title=d.title;if(d.mode)mode=d.mode;setTimeout(function(){setMode(mode);mark(false);document.getElementById('st').textContent='已恢复';setTimeout(function(){document.getElementById('st').textContent='已保存'},2000)},0);return true}}catch(e){}return false}

var zoomLevel=1,zoomTimer=null;
function updateZoomClass(){if(mode==='article'||mode==='report'){ma.classList.add('zoomable')}else{ma.classList.remove('zoomable')}}
function showZoom(){clearTimeout(zoomTimer);st.textContent=Math.round(zoomLevel*100)+'%';zoomTimer=setTimeout(function(){st.textContent=dirty?'已修改':'已保存'},1200)}
ma.addEventListener('wheel',function(e){if(!e.ctrlKey)return;if(mode!=='article'&&mode!=='report')return;e.preventDefault();var rect=ma.getBoundingClientRect();var mx=e.clientX-rect.left+ma.scrollLeft;var my=e.clientY-rect.top+ma.scrollTop;var old=zoomLevel;zoomLevel+=e.deltaY<0?0.1:-0.1;zoomLevel=Math.max(0.5,Math.min(2,Math.round(zoomLevel*10)/10));if(zoomLevel===old)return;var ratio=zoomLevel/old;ma.style.setProperty('--zoom',zoomLevel);ma.scrollLeft=mx*ratio-(e.clientX-rect.left);ma.scrollTop=my*ratio-(e.clientY-rect.top);showZoom()},{passive:false});
var _origSetMode=setMode;setMode=function(m){_origSetMode(m);updateZoomClass()};
