<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>OMD Editor</title>
<style>
:root{
  --bg:#1a1a2e;--tb:#16213e;--bd:#0f3460;--red:#e94560;--pink:#f0a0b0;
  --tx:#e0e0e0;--dim:#888;--warm:#f5f0eb;--card:#fff;--sb:#111827;
  --btn-bg:#1a1a2e;--code-bg:var(--bd);--quote-bg:rgba(233,69,96,0.06);
  --td-bg:#1a1a2e;--input-bg:#1a1a2e;--modal-bg:#16213e;
  --article-bg:#4b5563;--report-bg:#0f0f1a;--report-pg:var(--tb);
  --source-bg:#0a0a1a;--source-ed:#0f0f1a;--source-color:#c0c0d0;
  --status-bg:#0f0f1a;--note-tx:#2d2d2d;--note-h1:#c0392b;--note-h2:#8b4513;
  --note-strong:#000;--note-card-bd:#e5e0d8;--note-card-tx:#555;--note-card-nt:#333;--note-card-ns:#999;
  --sidebar-item:#9ca3af;--sidebar-hover:rgba(233,69,96,0.06);--sidebar-active:rgba(233,69,96,0.08);
  --ctx-bg:var(--tb);--ctx-bd:var(--bd);--ctx-tx:var(--tx);
}
body.light{
  --bg:#f5f5f0;--tb:#fafaf5;--bd:#d9d9d0;--tx:#1a1a1a;--dim:#999;
  --warm:#faf8f5;--card:#fff;--sb:#f0ede5;--btn-bg:#fff;--code-bg:#f0ede5;
  --quote-bg:rgba(233,69,96,0.05);--td-bg:#fff;--input-bg:#fff;--modal-bg:#fff;
  --article-bg:#9ca3af;--report-bg:#f5f5f0;--report-pg:#fff;
  --source-bg:#f5f5f0;--source-ed:#fff;--source-color:#333;
  --status-bg:#f0ede5;--note-tx:#1a1a1a;--note-h1:#c0392b;--note-h2:#8b4513;
  --note-strong:#000;--note-card-bd:#d9d9d0;--note-card-tx:#555;--note-card-nt:#333;--note-card-ns:#999;
  --sidebar-item:#777;--sidebar-hover:rgba(233,69,96,0.04);--sidebar-active:rgba(233,69,96,0.06);
  --ctx-bg:#fff;--ctx-bd:#d9d9d0;--ctx-tx:#1a1a1a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column}

.tb{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--tb);border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto;min-height:46px}
.tb .logo{font-size:20px;font-weight:700;color:var(--red);margin-right:10px}
.tb .sep{width:1px;height:22px;background:var(--bd);margin:0 2px;flex-shrink:0}

.mode-btn{height:34px;padding:0 14px;border:1px solid var(--bd);background:var(--btn-bg);color:var(--dim);border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.mode-btn:hover{background:rgba(255,255,255,.06);color:var(--tx)}
.mode-btn.on{border-color:var(--red);background:rgba(233,69,96,.14);color:var(--tx)}

.tb-btn{height:34px;padding:0 10px;border:1px solid var(--bd);background:var(--btn-bg);color:#b8c0cc;border-radius:5px;cursor:pointer;font-size:13px;white-space:nowrap;display:inline-flex;align-items:center}
.tb-btn:hover{background:rgba(255,255,255,.06);color:var(--tx)}
.exp-wrap{position:relative}
.exp-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--tb);border:1px solid var(--bd);border-radius:6px;padding:4px 0;min-width:170px;z-index:100}
.exp-menu.show{display:block}
.exp-menu div{padding:10px 16px;cursor:pointer;font-size:14px;color:var(--dim)}
.exp-menu div:hover{background:var(--bd);color:var(--tx)}

/* 主布局：左栏+右主区 */
.layout{flex:1;display:flex;overflow:hidden}
.sidebar{width:220px;background:var(--sb);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sidebar h3{padding:12px 16px 6px;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:0}
.sidebar .item{padding:8px 16px;cursor:pointer;font-size:13px;color:var(--sidebar-item);border-left:3px solid transparent;transition:.1s}
.sidebar .item:hover{background:var(--sidebar-hover);color:var(--tx)}
.sidebar .item.active{border-left-color:var(--red);background:var(--sidebar-active);color:var(--tx)}
.sidebar .item .sub{font-size:11px;color:var(--dim);margin-top:1px}
.sb-tab{flex:1;padding:10px 0;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:16px;border-bottom:2px solid transparent}
.sb-tab.on{border-bottom-color:var(--red);color:var(--tx)}
.main-area{flex:1;overflow:auto;display:flex;justify-content:center}

/* 灵感流模式 */
.block-stream{flex:1;overflow-y:auto;padding:16px}
.block{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;margin:4px 0;border-radius:12px;background:var(--card);border:1px solid transparent;transition:.15s;cursor:text}
.block:hover{border-color:var(--bd)}
.block:focus-within{border-color:var(--red);box-shadow:0 0 0 2px rgba(233,69,96,.15)}
.block-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center;line-height:1.4;user-select:none}
.block-text{flex:1;outline:none;font-size:16px;line-height:1.6;color:var(--note-tx);min-height:24px;word-break:break-word}
.block-text:empty:before{content:attr(data-placeholder);color:var(--dim);opacity:.5}
.block-empty .block-text{color:var(--dim)}
.block[data-type="h1"] .block-text{font-size:24px;font-weight:700}
.block[data-type="h2"] .block-text{font-size:20px;font-weight:600}
.block[data-type="quote"] .block-text{font-style:italic;color:var(--dim);border-left:3px solid var(--red);padding-left:12px}
.block[data-type="done"] .block-text{text-decoration:line-through;color:var(--dim)}
.block[data-type="pin"]{background:rgba(233,69,96,.06);border-color:rgba(233,69,96,.2)}
.block-toolbar{display:flex;gap:8px;padding:12px 16px 16px;justify-content:center;flex-shrink:0;border-top:1px solid var(--bd);background:var(--tb)}
.block-toolbar button{width:48px;height:48px;border-radius:50%;border:1px solid var(--bd);background:var(--btn-bg);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.block-toolbar button:hover{background:var(--bd);transform:scale(1.08)}
.block-toolbar button:active{transform:scale(.95)}
@media(max-width:700px){.block-stream{padding:12px 8px}.block{padding:12px;gap:10px}.block-icon{font-size:20px;width:28px}.block-text{font-size:15px}.block-toolbar{gap:6px;padding:10px 12px 14px}.block-toolbar button{width:44px;height:44px;font-size:20px}}


/* 文稿模式 */
.main-area.article{background:var(--article-bg);padding:32px 24px;flex-direction:column;align-items:center;gap:32px}
.article-page{width:min(210mm, calc(100vw - 260px));min-height:297mm;padding:37mm 26mm 35mm 28mm;background:#fff;color:#000;box-shadow:0 2px 16px rgba(0,0,0,.2);font-family:FangSong,"仿宋",SimSun,serif;font-size:16pt;line-height:29pt;outline:none;position:relative}
.article-page p{margin:0;text-indent:2em}
.article-page h1{font-family:SimSun,"黑体",sans-serif;font-size:22pt;text-align:center;color:#000;margin:0 0 24pt;text-indent:0}
.article-page h2{font-family:SimSun,"黑体",sans-serif;font-size:16pt;text-indent:0;margin:16pt 0 8pt;color:#000}
.article-page h3{font-family:FangSong,"仿宋",serif;font-size:16pt;font-weight:bold;text-indent:2em;margin:8pt 0;color:#000}
.article-page table{width:100%;border-collapse:collapse;margin:12pt 0;font-size:14pt}
.article-page th,.article-page td{border:1px solid #000;padding:4pt 8pt}
.article-page th{background:#f3f4f6;text-align:center}
.article-page td{text-indent:0}
.article-page .page-num{position:absolute;bottom:8mm;left:0;right:0;text-align:center;font-size:10pt;color:#999;font-family:sans-serif}

/* 演讲模式 */
.main-area.report{background:var(--report-bg);padding:32px 24px;flex-direction:column;align-items:center;gap:24px}
.slide-page{padding:48px 64px;background:var(--tb);color:var(--tx);border-radius:12px;border:1px solid var(--bd);font-size:18px;line-height:1.8;box-shadow:0 4px 24px rgba(0,0,0,.3);outline:none;position:relative}
.slide-page h1{font-size:36px;color:var(--red);margin-bottom:20px}
.slide-page h2{font-size:24px;color:var(--pink);margin:24px 0 12px}
.slide-page .slide-num{position:absolute;bottom:12px;right:16px;font-size:12px;color:var(--dim)}

/* 源码模式 */
.main-area.source{background:var(--source-bg);padding:20px}
.main-area.source #ed{width:100%;max-width:900px;background:var(--source-ed);color:var(--source-color);border:1px solid var(--bd);border-radius:6px;padding:20px;font-family:Consolas,monospace;font-size:13px;line-height:1.7;resize:none;outline:none}

/* 通用编辑器 */
#ed{outline:none;word-wrap:break-word}
#ed h1{color:var(--red);margin-bottom:12px}
#ed h2{color:var(--pink);margin-bottom:8px}
#ed table{border-collapse:collapse;width:100%;margin:16px 0}
#ed th,#ed td{border:1px solid var(--bd);padding:8px 12px;min-width:60px}
#ed th{background:var(--tb);color:var(--red)}
#ed td{background:var(--td-bg)}
#ed code{background:var(--bd);padding:2px 6px;border-radius:3px;font-size:13px}
#ed blockquote{border-left:3px solid var(--red);padding:8px 16px;margin:16px 0;background:rgba(233,69,96,0.06)}
#ed ul,#ed ol{padding-left:24px}
#ed img{max-width:100%;border-radius:8px;margin:16px 0}
#ed hr{border:none;border-top:1px solid var(--bd);margin:28px 0}

/* AI 状态 */
.ai-status{display:flex;align-items:center;padding:10px 16px;font-size:11px;color:var(--dim);border-top:1px solid var(--bd);gap:6px;margin-top:auto}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#4ecca3;flex-shrink:0}
.ai-dot.off{background:var(--dim)}

.sb{display:flex;align-items:center;height:28px;padding:0 16px;background:var(--status-bg);border-top:1px solid var(--bd);font-size:12px;color:var(--dim);flex-shrink:0;gap:10px}
.sb .dot{width:7px;height:7px;border-radius:50%;background:#4ecca3;display:inline-block}
.sb .dot.d{background:var(--red)}
</style></head>
<body>

<div class="tb">
  <span class="logo">OMD</span>
  <button class="mode-btn on" id="mode-default">📝 默认</button>
  <button class="mode-btn" id="mode-article">📄 文稿</button>
  <button class="mode-btn" id="mode-report">📽 演讲</button>
  <button class="mode-btn" id="mode-source">⟨⟩ 源码</button>
  <span class="sep"></span>
  <span id="article-opts" style="display:none;gap:4px">
    <select id="page-size" style="padding:5px 8px;border:1px solid var(--bd);background:#1a1a2e;color:var(--dim);border-radius:4px;font-size:12px"><option>A4</option><option>Letter</option></select>
  </span>
  <span id="report-opts" style="display:none;gap:4px">
    <select id="slide-ratio" style="padding:5px 8px;border:1px solid var(--bd);background:#1a1a2e;color:var(--dim);border-radius:4px;font-size:12px"><option>16:9</option><option>4:3</option></select>
  </span>
  <span class="sep"></span>
  <button class="tb-btn" id="b-b"><b>B</b></button>
  <button class="tb-btn" id="b-i"><i>I</i></button>
  <button class="tb-btn" id="b-h1">H1</button>
  <button class="tb-btn" id="b-h2">H2</button>
  <button class="tb-btn" id="b-list">≡</button>
  <button class="tb-btn" id="b-quote">❝</button>
  <button class="tb-btn" id="b-table">⊞ 表格</button>
  <button class="tb-btn" id="b-img">🖼</button>
  <span style="flex:1"></span>
  <button class="tb-btn" id="b-theme">🌓</button>
  <button class="tb-btn" id="b-new">新建</button>
  <button class="tb-btn" id="b-open">打开</button>
  <button class="tb-btn" style="border-color:var(--red);color:var(--red)" id="b-save">保存</button>
  <div class="exp-wrap"><button class="tb-btn" style="background:var(--red);border-color:var(--red);color:#fff" id="b-export">⤓ 导出 ▾</button>
    <div class="exp-menu" id="exp-menu"><div data-fmt="docx">📄 Word</div><div data-fmt="xlsx">📊 Excel</div><div data-fmt="pptx">📽 PPT</div><div data-fmt="pdf">📕 PDF</div></div>
  </div>
</div>

<div class="layout" id="layout">
  <div class="sidebar" id="sidebar">
    <div style="display:flex;border-bottom:1px solid var(--bd)">
      <button class="sb-tab on" id="tab-outline">📑</button>
      <button class="sb-tab" id="tab-vault">📁</button>
    </div>
    <div id="sidebar-content"></div>
  </div>
  <div class="main-area default" id="main-area"><div class="block-stream" id="block-stream"></div><div class="block-toolbar" id="block-toolbar"><button title="想法" onclick="addBlock('idea')">💡</button><button title="待办" onclick="addBlock('todo')">⬜</button><button title="完成" onclick="addBlock('done')">✅</button><button title="重点" onclick="addBlock('pin')">📌</button><button title="标题" onclick="addBlock('h1')">T</button><button title="引用" onclick="addBlock('quote')">💬</button></div></div>
</div>

<div class="sb"><span class="dot" id="dot"></span><span id="st">已保存</span><span style="margin:0 8px;color:var(--bd)">|</span><span id="mode-label">默认模式</span><span style="margin:0 8px;color:var(--bd)">|</span><span id="wc">0 字</span><span style="margin-left:auto">OMD · 智慧生而共通</span></div>

<script>
var mode='default',dirty=false,currentOMD='',title='新文档',sidebarTab='outline';
var ed=document.getElementById('ed'),sb=document.getElementById('sidebar-content'),
    ma=document.getElementById('main-area'),dot=document.getElementById('dot'),
    st=document.getElementById('st'),ml=document.getElementById('mode-label');

var DEFAULT_ARTICLE='---\ntitle: "公文文档"\ntags: [公文]\n---\n\n# 关于印发《品质管理办法》的通知\n\n各部门：\n\n为规范公司产品品质管理流程，确保产品符合客户要求及行业标准，特制定《品质管理办法》，现印发给你们，请遵照执行。\n\n## 第一章 总则\n\n### 第一条 目的\n\n为规范公司产品品质管理流程，确保产品符合客户要求及行业标准，特制定本办法。\n\n### 第二条 适用范围\n\n本办法适用于公司所有产品的设计、生产、检验、交付全过程。\n\n### 第三条 引用标准\n\n- ISO 9001:2015 质量管理体系\n- GB/T 19001-2016 质量管理体系要求\n\n## 第二章 职责分工\n\n### 第四条 品质管理部门职责\n\n品质管理部负责制定和修订品质管理制度，组织产品检验和测试，处理客户投诉和品质异常。\n\n### 第五条 生产部门职责\n\n生产部门须严格执行品质管理制度，做好首检、自检、互检工作，确保产品质量符合标准。\n\n## 第三章 检验标准\n\n| 项目 | 检验标准 | 检验方法 | 频次 |\n| --- | --- | --- | --- |\n| 外观 | 无划痕、无变形 | 目视 | 每批 |\n| 尺寸 | ±0.1mm | 卡尺测量 | 首件 |\n| 性能 | 符合规格书 | 测试台 | 每批 |\n\n## 第四章 附则\n\n本办法自发布之日起生效，由品质管理部负责解释。此前相关制度同时废止。\n\n<!--OMD\ndocument:\n  font: "仿宋"\n  font_size: 16\n  page_size: "A4"\n  page_margin: [37, 35, 28, 26]\n-->\n';

var SAMPLE_NOTES=[
  {t:'今日随想',s:'今天想到OMD应该是一个思考空间，不只是工具...',d:'06-16',tag:'思考'},
  {t:'项目周报',s:'本周完成了编辑器框架、格式导出、表格修复...',d:'06-15',tag:'工作'},
  {t:'读书笔记: 设计心理学',s:'好的设计让用户感觉不到设计的存在...',d:'06-14',tag:'阅读'}
];

var DEFAULT='---\ntitle: "新文档"\ntags: []\n---\n\n# 新文档\n\n开始编写...\n\n<!--OMD\n-->\n';
currentOMD=DEFAULT;

function parseOMD(omd){var t=omd.trimStart();var m=t.match(/^---\n([\s\S]*?)\n---\n/);var meta={title:''},rest=t;if(m){try{m[1].split('\n').forEach(function(l){var x=l.match(/^(\w+):\s*(.+)/);if(x&&x[1]==='title')meta.title=x[2].trim().replace(/^"(.*)"$/,'$1')})}catch(e){}rest=t.slice(m[0].length)}var r=rest.match(/<!--OMD\n?([\s\S]*?)\n?-->/);var body=rest;if(r)body=rest.slice(0,r.index).trim();else body=rest.trim();return{meta:meta,body:body}}
function mdToHTML(body){var h='',lines=body.split('\n'),inT=false,tH='',inC=false,cH='';for(var i=0;i<lines.length;i++){var l=lines[i];if(/^```/.test(l)){if(inC){h+='<pre><code>'+esc(cH.trim())+'</code></pre>\n';cH='';inC=false}else{inC=true}continue}if(inC){cH+=l+'\n';continue}if(/^\|.+\|/.test(l)){if(!inT){inT=true;tH='<table>'}if(/^\|[\s\-:]+\|$/.test(l))continue;var tag=tH==='<table>'?'th':'td';tH+='<tr>'+l.split('|').slice(1,-1).map(function(c){return'<'+tag+'>'+c.trim()+'</'+tag+'>'}).join('')+'</tr>';continue}else if(inT){h+=tH+'</table>\n';tH='';inT=false}if(/^#### (.+)/.test(l))h+='<h4>'+l.slice(5)+'</h4>\n';else if(/^### (.+)/.test(l))h+='<h3>'+l.slice(4)+'</h3>\n';else if(/^## (.+)/.test(l))h+='<h2>'+l.slice(3)+'</h2>\n';else if(/^# (.+)/.test(l))h+='<h1>'+l.slice(2)+'</h1>\n';else if(/^> (.+)/.test(l))h+='<blockquote>'+l.slice(2)+'</blockquote>\n';else if(/^---+$/.test(l.trim()))h+='<hr>\n';else if(/^[\-\*] (.+)/.test(l))h+='<li>'+l.slice(2)+'</li>\n';else if(/^\s*$/.test(l))h+='<br>';else{var t=l;t=t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');t=t.replace(/`([^`]+)`/g,'<code>$1</code>');t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');h+='<p>'+t+'</p>\n'}}if(inT)h+=tH+'</table>\n';if(inC)h+='<pre><code>'+esc(cH.trim())+'</code></pre>\n';h=h.replace(/((?:<li>[\s\S]*?<\/li>\n?)+)/g,'<ul>$1</ul>');return h}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function getActiveEditable(){return document.activeElement&&document.activeElement.isContentEditable?document.activeElement:document.querySelector('[contenteditable="true"]:focus')||document.querySelector('[contenteditable="true"]')}
function doCmd(cmd,val){var el=getActiveEditable();if(el){el.focus();document.execCommand(cmd,false,val);mark(true)}}
function wysiwygToMD(el){var p=[];function w(n){if(n.nodeType===3){p.push(n.textContent);return}if(n.nodeType!==1)return;var t=n.tagName.toLowerCase(),k=n.childNodes;function e(){for(var i=0;i<k.length;i++)w(k[i])}switch(t){case'h1':p.push('# ');e();p.push('\n\n');break;case'h2':p.push('## ');e();p.push('\n\n');break;case'h3':p.push('### ');e();p.push('\n\n');break;case'h4':p.push('#### ');e();p.push('\n\n');break;case'p':e();p.push('\n\n');break;case'strong':p.push('**');e();p.push('**');break;case'em':p.push('*');e();p.push('*');break;case'code':if(n.parentNode.tagName.toLowerCase()==='pre'){p.push('\n```\n');e();p.push('\n```\n')}else{p.push('`');e();p.push('`')}break;case'pre':e();break;case'blockquote':p.push('> '+n.textContent.trim().replace(/\n/g,'\n> ')+'\n\n');break;case'li':p.push('- ');e();p.push('\n');break;case'ul':case'ol':e();p.push('\n');break;case'br':p.push('\n');break;case'table':var rs=n.querySelectorAll('tr');for(var r=0;r<rs.length;r++){var cs=rs[r].querySelectorAll('th,td');p.push('|'+Array.from(cs).map(function(c){return' '+c.textContent.trim()+' |'}).join('')+'\n');if(r===0&&cs.length)p.push('|'+Array.from(cs).map(function(){return' --- |'}).join('')+'\n')}p.push('\n');break;default:e();break}}w(el);return p.join('').replace(/\n{3,}/g,'\n\n').trim()}
function getOMDTail(omd){var m=omd.match(/<!--OMD\n?([\s\S]*?)\n?-->/);return m?'<!--OMD\n'+m[1].trim()+'\n-->':'<!--OMD\n-->'}
function sync(){var tail=getOMDTail(currentOMD);currentOMD='---\ntitle: "'+title+'"\ntags: []\n---\n\n'+wysiwygToMD(ed)+'\n\n'+tail}
function refresh(){ed.innerHTML=mdToHTML(parseOMD(currentOMD).body)}
function mark(d){dirty=d;dot.className='dot'+(d?' d':'');st.textContent=d?'已修改':'已保存'}

// 侧边栏渲染
function buildSidebar(m){if(sidebarTab==="vault"){loadVault();return}
  sb.innerHTML='';
  var names={default:'笔记',article:'大纲',report:'幻灯片',source:'文件结构'};
  sb.innerHTML='<h3>'+names[m]+'</h3>';
  var d=parseOMD(currentOMD);

  if(m==='default'){
    SAMPLE_NOTES.forEach(function(n){sb.innerHTML+='<div class="item"><div>'+n.t+'</div><div class="sub">'+n.s+'</div></div>'});
    sb.innerHTML+='<div class="ai-status"><span class="ai-dot"></span> AI 已索引 3 篇</div>';
  }else if(m==='article'){
    var outline=extractOutline(d.body);
    outline.forEach(function(o){sb.innerHTML+='<div class="item" style="padding-left:'+(12+o.level*16)+'px">'+'H'+o.level+' '.repeat(o.level-1)+o.text+'</div>'});
  }else if(m==='report'){
    var slides=d.body.split(/---slide---/);if(slides.length===1)slides=d.body.split(/\n(?=# )/);
    slides.forEach(function(s,i){var t=s.trim().split('\n')[0].replace(/^#+\s*/,'').slice(0,20);sb.innerHTML+='<div class="item active'+(i===0?' active':'')+'">'+(i+1)+'. '+(t||'幻灯片'+(i+1))+'</div>'});
  }else if(m==='source'){
    var y=d.body.indexOf('---')>=0,b=mdToHTML(d.body).length;
    sb.innerHTML+='<div class="item">📋 YAML <span class="sub">'+(JSON.stringify(d.meta).length)+'B</span></div>';
    sb.innerHTML+='<div class="item">📝 Body <span class="sub">'+d.body.length+'B, '+d.body.split('\n').length+'行</span></div>';
    var imgs=d.body.match(/!\[.*?\]\(data:image/g);if(imgs)sb.innerHTML+='<div class="item">🖼 Images <span class="sub">'+imgs.length+'张</span></div>';
    sb.innerHTML+='<div class="item">&lt;!--OMD--&gt; <span class="sub">'+((currentOMD.match(/<!--OMD([\s\S]*?)-->/m)||[])[1]||'').length+'B</span></div>';
  }
}


// Vault 文件列表
function loadVault(){
  sb.innerHTML='<h3>📁 Vault</h3><div class="item" style="color:var(--dim)">加载中...</div>';
  fetch('/api/mcp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tool:'omd_list',args:{}})})
    .then(function(r){return r.json()})
    .then(function(data){
      var text=data.content&&data.content[0]?data.content[0].text:'{}';
      var list=JSON.parse(text);
      sb.innerHTML='<h3>📁 Vault ('+list.count+')</h3>';
      (list.files||[]).forEach(function(f){
        sb.innerHTML+='<div class="item" onclick="loadVaultFile(\''+f.path+'\')" title="'+f.path+'">'+f.title+'<div class="sub">'+(f.size/1024).toFixed(1)+'KB · '+f.modified.slice(0,10)+'</div></div>';
      });
    })
    .catch(function(){sb.innerHTML='<h3>📁 Vault</h3><div class="item" style="color:var(--red)">连接失败</div>'});
}

function loadVaultFile(p){
  sb.innerHTML='<h3>📁 加载中...</h3>';
  fetch('/api/mcp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tool:'omd_read',args:{path:p,format:'full'}})})
    .then(function(r){return r.json()})
    .then(function(data){
      var text=data.content&&data.content[0]?data.content[0].text:'{}';
      var doc=JSON.parse(text);
      currentOMD='---\ntitle: "'+(doc.title||p)+'"\ntags: []\n---\n\n'+doc.body+'\n\n<!--OMD\n-->';
      title=doc.title||p.replace(/\.md$/,'');
      mark(false);setMode(mode);refresh();
    })
    .catch(function(){alert('加载失败')});
}

// 侧边栏标签切换
document.getElementById('tab-outline').onclick=function(){

function extractOutline(body){
  var lines=body.split('\n'),out=[];
  lines.forEach(function(l){
    var m=l.match(/^(#{1,6})\s+(.+)/);
    if(m)out.push({level:m[1].length,text:m[2]});
  });
  return out;
}

function setMode(m){
  if(m===mode)return;
  if(mode==='source'&&m!=='source'){currentOMD=ed.value||currentOMD;title=(currentOMD.match(/^title:\s*"([^"]+)"/m)||[])[1]||title}
  if(m==='source')sync();
  mode=m;
  ml.textContent={default:'默认模式',article:'文稿模式',report:'演讲模式',source:'源码模式'}[m];
  document.querySelectorAll('.mode-btn').forEach(function(b){b.className='mode-btn'});
  var mb=document.getElementById('mode-'+m);if(mb)mb.className='mode-btn on';

  var ao=document.getElementById('article-opts'),ro=document.getElementById('report-opts');
  ao.style.display=m==='article'?'flex':'none';
  ro.style.display=m==='report'?'flex':'none';

  ma.innerHTML='';
  ma.className='main-area '+m;

  if(m==='default'){
    ma.style.padding='0';
    ma.innerHTML='<div class="block-stream" id="block-stream"></div><div class="block-toolbar" id="block-toolbar">'+'<button title="想法" onclick="addBlock('idea')">💡</button>'+'<button title="待办" onclick="addBlock('todo')">⬜</button>'+'<button title="完成" onclick="addBlock('done')">✅</button>'+'<button title="重点" onclick="addBlock('pin')">📌</button>'+'<button title="标题" onclick="addBlock('h1')">T</button>'+'<button title="引用" onclick="addBlock('quote')">💬</button>'+'</div>';
    renderBlocks();
    buildSidebar(m);
    return;
  }else if(m==='article'){
    ma.style.padding='32px 0';
    renderArticlePages();
    buildSidebar(m);
    return;
  }else if(m==='report'){
    ma.style.padding='40px 0';
    renderReportPages();
    buildSidebar(m);
    return;
  }else if(m==='source'){
    ma.innerHTML='<textarea id="ed" spellcheck="false" style="width:100%;height:100%;background:#0f0f1a;color:#c0c0d0;border:1px solid var(--bd);border-radius:6px;padding:16px;font-family:Consolas,monospace;font-size:13px;line-height:1.7;resize:none;outline:none">'+esc(currentOMD)+'</textarea>';
    ed=document.getElementById('ed');ed.addEventListener('input',function(){mark(true)});
    buildSidebar(m);
    return;
  }
  ed=document.getElementById('ed');
  refresh();
  bindEditorEvents();
  buildSidebar(m);
}

function renderArticlePages(){
  var d=parseOMD(currentOMD),blocks=d.body.split('\n\n'),pages=[],cur='',c=0;
  for(var i=0;i<blocks.length;i++){cur+=(cur?'\n\n':'')+blocks[i];c++;if(c>=15||i===blocks.length-1){pages.push(cur);cur='';c=0}}
  if(!pages.length)pages.push('');
  pages.forEach(function(pg,i){ma.innerHTML+='<div class="article-page" data-page="'+i+'" contenteditable="true">'+mdToHTML(pg)+'<div class="page-num">— '+(i+1)+' —</div></div>'});
}

function renderReportPages(){
  var d=parseOMD(currentOMD),slides=d.body.split(/---slide---/);
  if(slides.length===1)slides=d.body.split(/\n(?=# )/);
  var w=960,h=540,ratio=document.getElementById('slide-ratio').value;
  if(ratio==='4:3'){w=960;h=720}
  slides.forEach(function(s,i){ma.innerHTML+='<div class="slide-page" contenteditable="true" style="width:'+w+'px;min-height:'+h+'px">'+mdToHTML(s.trim())+'<span class="slide-num">'+(i+1)+'/'+slides.length+'</span></div>'});
}

function save(){
  sync();
  // 尝试 File System Access API
  if(window.showSaveFilePicker){
    var opts={suggestedName:title+'.omd',types:[{description:'OMD 文档',accept:{'text/markdown':['.omd','.md']}}]};
    window.showSaveFilePicker(opts).then(function(h){
      h.createWritable().then(function(w){
        w.write(currentOMD).then(function(){w.close();mark(false)});
      });
    }).catch(function(){});
    return;
  }
  // 降级：download
  var b=new Blob([currentOMD],{type:'text/markdown'});
  var u=URL.createObjectURL(b);var a=document.createElement('a');
  a.href=u;a.download=title+'.omd';a.click();URL.revokeObjectURL(u);mark(false);refresh();
}
function openFile(){
  // 尝试 File System Access API
  if(window.showOpenFilePicker){
    window.showOpenFilePicker({types:[{description:'OMD 文档',accept:{'text/markdown':['.omd','.md','.txt']}}]}).then(function(hs){
      hs[0].getFile().then(function(f){
        f.text().then(function(t){currentOMD=t;title=f.name.replace(/\\.(omd|md|txt)$/,'');mark(false);setMode(mode);refresh()});
      });
    }).catch(function(){});
    return;
  }
  // 降级
  var i=document.createElement('input');i.type='file';i.accept='.omd,.md,.txt';
  i.onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();
    r.onload=function(ev){currentOMD=ev.target.result;title=f.name.replace(/\\.(omd|md|txt)$/,'');mark(false);setMode(mode);refresh()};
    r.readAsText(f)};i.click();
}
function exportFmt(f){sync();fetch('/api/export/'+f,{method:'POST',body:currentOMD}).then(function(r){return r.blob()}).then(function(b){var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=title+'.'+f;a.click();URL.revokeObjectURL(u)}).catch(function(){alert('导出服务未启动')})}
function handleDrop(e){e.preventDefault();var f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){var r=new FileReader();r.onload=function(ev){document.execCommand('insertImage',false,ev.target.result);mark(true)};r.readAsDataURL(f)}}
function bindEditorEvents(){ed.addEventListener('drop',handleDrop);ed.addEventListener('dragover',function(e){e.preventDefault()});ed.addEventListener('input',function(){mark(true)})}

expBtn.onclick=function(e){e.stopPropagation();expMenu.classList.toggle('show')};

// 键盘快捷键
document.addEventListener('keydown',function(e){
  if(!e.ctrlKey&&!e.metaKey)return;
  switch(e.key){
    case'b':e.preventDefault();doCmd('bold');break;
    case'i':e.preventDefault();doCmd('italic');break;
    case'1':e.preventDefault();doCmd('formatBlock','h1');break;
    case'2':e.preventDefault();doCmd('formatBlock','h2');break;
    case'3':e.preventDefault();doCmd('formatBlock','h3');break;
    case's':e.preventDefault();save();break;
    case'l':if(e.shiftKey){e.preventDefault();doCmd('insertUnorderedList')}break;
    case'q':if(e.shiftKey){e.preventDefault();doCmd('formatBlock','blockquote')}break;
  }
});

// 剪贴板粘贴图片
document.addEventListener('paste',function(e){
  var items=e.clipboardData&&e.clipboardData.items;
  if(!items)return;
  for(var i=0;i<items.length;i++){
    if(items[i].type.indexOf('image')===0){
      e.preventDefault();
      var blob=items[i].getAsFile();
      var r=new FileReader();
      r.onload=function(ev){doCmd('insertImage',ev.target.result)};
      r.readAsDataURL(blob);
      return;
    }
  }
});

// 字数统计
function updateWC(){
  var el=document.querySelector('[contenteditable=\"true\"]:focus')||ed;
  if(!el)return;
  var t=el.textContent||'';
  var cn=t.match(/[\u4e00-\u9fff]/g);cn=cn?cn.length:0;
  var en=t.match(/[a-zA-Z]+/g);en=en?en.length:0;
  document.getElementById('wc').textContent=(cn+en)+' 字';
}
document.addEventListener('input',updateWC);
document.addEventListener('selectionchange',function(){setTimeout(updateWC,100)});

bindEditorEvents();
buildSidebar('default');

var BLOCK_ICONS={idea:"💡",todo:"⬜",done:"✅",pin:"📌",h1:"#",h2:"##",quote:"💬"};
var BLOCK_PLACEHOLDER={idea:"写点什么...",todo:"待办事项...",done:"已完成...",pin:"重点标记...",h1:"标题",h2:"副标题",quote:"引用..."};
function createBlock(type,text){var d=document.createElement("div");d.className="block"+(text?"":" block-empty");d.setAttribute("data-type",type);d.innerHTML="<span class="block-icon">"+BLOCK_ICONS[type]+"</span><span class="block-text" contenteditable="true" data-placeholder=""+BLOCK_PLACEHOLDER[type]+""></span>";if(text)d.querySelector(".block-text").textContent=text;var txt=d.querySelector(".block-text");txt.addEventListener("keydown",blockKeydown);txt.addEventListener("input",function(){mark(true)});txt.addEventListener("focus",function(){d.classList.remove("block-empty")});txt.addEventListener("blur",function(){if(!this.textContent.trim())d.classList.add("block-empty")});return d}
function addBlock(type){var s=document.getElementById("block-stream");var b=createBlock(type);s.appendChild(b);b.querySelector(".block-text").focus();mark(true)}
function blockKeydown(e){if(e.key==="Enter"){e.preventDefault();var type=this.parentNode.getAttribute("data-type");var b=createBlock(type);this.parentNode.parentNode.insertBefore(b,this.parentNode.nextSibling);b.querySelector(".block-text").focus()}else if(e.key==="Backspace"&&!this.textContent.trim()&&document.querySelectorAll(".block").length>1){e.preventDefault();var prev=this.parentNode.previousSibling;this.parentNode.remove();if(prev&&prev.querySelector){var t=prev.querySelector(".block-text");if(t){t.focus();var r=document.createRange();r.selectNodeContents(t);r.collapse(false);var s=window.getSelection();s.removeAllRanges();s.addRange(r)}}}}
function blocksToMD(){var lines=[],blocks=document.querySelectorAll(".block");blocks.forEach(function(b){var type=b.getAttribute("data-type"),text=(b.querySelector(".block-text")||{}).textContent||"";switch(type){case"h1":lines.push("# "+text);break;case"h2":lines.push("## "+text);break;case"idea":lines.push(text);break;case"todo":lines.push("- [ ] "+text);break;case"done":lines.push("- [x] "+text);break;case"pin":lines.push("**"+text+"**");break;case"quote":lines.push("> "+text);break;default:lines.push(text)}});return lines.join("

")}
function renderBlocks(){var s=document.getElementById("block-stream");if(!s)return;s.innerHTML="";var d=parseOMD(currentOMD);var blocks=parseMDToBlocks(d.body);if(!blocks.length){addBlock("idea");return}blocks.forEach(function(b){var el=createBlock(b.type,b.text);s.appendChild(el)})}
function parseMDToBlocks(body){if(!body||!body.trim())return[];var lines=body.split("
"),blocks=[];for(var i=0;i<lines.length;i++){var l=lines[i];if(/^- [x] (.+)/.test(l)){blocks.push({type:"done",text:l.match(/^- [x] (.+)/)[1]})}else if(/^- [ ] (.+)/.test(l)){blocks.push({type:"todo",text:l.match(/^- [ ] (.+)/)[1]})}else if(/^# (.+)/.test(l)){blocks.push({type:"h1",text:l.match(/^# (.+)/)[1]})}else if(/^## (.+)/.test(l)){blocks.push({type:"h2",text:l.match(/^## (.+)/)[1]})}else if(/^> (.+)/.test(l)){blocks.push({type:"quote",text:l.match(/^> (.+)/)[1]})}else if(/^**(.+)**$/.test(l)){blocks.push({type:"pin",text:l.match(/^**(.+)**$/)[1]})}else if(/^s*$/.test(l)){}else{blocks.push({type:"idea",text:l})}}return blocks}
var _origSync=sync;sync=function(){if(mode==="default"){var tail=getOMDTail(currentOMD);currentOMD="---
title: ""+title+""
tags: []
---

"+blocksToMD()+"

"+tail;return}return _origSync();};
var _origRefresh=refresh;refresh=function(){if(mode==="default"){renderBlocks();return}return _origRefresh();};
refresh();
